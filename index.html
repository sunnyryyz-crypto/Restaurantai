<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

    <script>

                                <h4 class="font-bold text-gray-800 mb-2">Thematic Categories:</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="bg-purple-50 p-3 rounded-lg"><h5 class="font-bold text-purple-700 text-sm">Everyday Life</h5></div>
                                    <div class="bg-purple-50 p-3 rounded-lg"><h5 class="font-bold text-purple-700 text-sm">People</h5></div>
                                    <div class="bg-purple-50 p-3 rounded-lg"><h5 class="font-bold text-purple-700 text-sm">Work</h5></div>
                                    <div class="bg-purple-50 p-3 rounded-lg"><h5 class="font-bold text-purple-700 text-sm">Leisure</h5></div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="bg-gray-50 p-6 rounded-xl shadow-md mb-6">
                                <div class="flex items-center mb-4">
                                    <img src="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=800&q=80" onerror="this.onerror=null; this.src='https://placehold.co/100x100/A855F7/fff?text=Spoken';" alt="Spoken English" class="w-20 h-20 object-cover rounded-lg mr-4">
                                    <h3 class="text-xl font-bold text-gray-800">Spoken English</h3>
                                </div>
                                <p class="text-gray-700 mb-4">Master pronunciation, contractions, and natural speech patterns for fluent communication.</p>
                                <h4 class="font-bold text-gray-800 mb-2">Key Focus Areas:</h4>
                                <div class="space-y-3">
                                    <div class="flex items-center"><div class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mr-3"><i class="fas fa-volume-up"></i></div><span class="text-gray-700">Pronunciation fundamentals</span></div>
                                    <div class="flex items-center"><div class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mr-3"><i class="fas fa-compress-alt"></i></div><span class="text-gray-700">Mastering contractions</span></div>
                                    <div class="flex items-center"><div class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mr-3"><i class="fas fa-spell-check"></i></div><span class="text-gray-700">Silent letters and homophones</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- NEW SECTION: FOUNDATIONAL SKILLS DEEP DIVE -->
                <div class="bg-white p-8 rounded-xl shadow-md">
                    <h2 class="text-3xl font-bold text-gray-800 mb-6">Deep Dive: Foundational Skills</h2>
                    <p class="text-gray-600 mb-6">Foundational skills are the building blocks for learning and development. Here's a breakdown of the key concepts that form the basis of effective learning.</p>

                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-purple-700 mb-4">Philosophical Foundations of Knowledge</h3>
                        <p class="text-gray-700 mb-2">In epistemology, foundationalism posits that some sources of knowledge are basic and can justify beliefs without relying on other mental states. These include:</p>
                        <ul class="list-disc list-inside space-y-2 text-gray-700 ml-4">
                            <li><strong class="font-semibold">Perception:</strong> Using senses to learn about the external world.</li>
                            <li><strong class="font-semibold">Introspection:</strong> Self-reflection.</li>
                            <li><strong class="font-semibold">Rational intuition, inference, and testimony.</strong></li>
                        </ul>
                    </div>
                    
                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-purple-700 mb-4">Biological and Early Development</h3>
                        <p class="text-gray-700 mb-2">Learning begins early and has a "disproportional impact" on a person's life. Key concepts include:</p>
                        <ul class="list-disc list-inside space-y-2 text-gray-700 ml-4">
                            <li><strong class="font-semibold">Biologically primary knowledge:</strong> Inherent abilities like recognizing faces and speech.</li>
                            <li><strong class="font-semibold">Memory:</strong> The foundational faculty for language, relationships, and identity.</li>
                            <li><strong class="font-semibold">Working memory:</strong> The part of memory where active thought processes occur.</li>
                            <li><strong class="font-semibold">Sleep:</strong> Crucial for memory consolidation.</li>
                        </ul>
                    </div>

                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-purple-700 mb-4">Language Learning Foundations</h3>
                        <p class="text-gray-700 mb-2">For English learners, foundational skills focus on practical communication:</p>
                        <ul class="list-disc list-inside space-y-2 text-gray-700 ml-4">
                            <li><strong class="font-semibold">Contractions:</strong> Using "I'm," "don't," etc., to sound natural and fluent.</li>
                            <li><strong class="font-semibold">Pronunciation:</strong> Mastering vowel sounds, silent letters, and stress.</li>
                            <li><strong class="font-semibold">Sentence Structure:</strong> Understanding basic components like subject-verb-object.</li>
                            <li><strong class="font-semibold">Phrasal and Prepositional Verbs:</strong> Essential for everyday spoken English.</li>
                        </ul>
                    </div>

                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-purple-700 mb-4">Digital Literacy Foundations</h3>
                        <p class="text-gray-700 mb-2">Key digital skills for effective learning in a modern environment:</p>
                        <ul class="list-disc list-inside space-y-2 text-gray-700 ml-4">
                            <li>Using apps and tools wisely (e.g., offline mode, voice notes, Google Translate).</li>
                            <li>Navigating accounts, passwords, and file management.</li>
                            <li>Joining and participating in online study groups.</li>
                        </ul>
                    </div>

                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-purple-700 mb-4">Workplace and Personal Effectiveness</h3>
                        <p class="text-gray-700 mb-2">Beyond language, these skills are crucial for career success:</p>
                        <ul class="list-disc list-inside space-y-2 text-gray-700 ml-4">
                            <li><strong class="font-semibold">Hard Skills:</strong> Technical, quantifiable abilities (e.g., programming, driving).</li>
                            <li><strong class="font-semibold">Soft Skills:</strong> Interpersonal and social skills (e.g., communication, teamwork, emotional intelligence).</li>
                            <li><strong class="font-semibold">Interview Skills:</strong> Preparation, punctuality, eye contact, and asking questions.</li>
                        </ul>
                    </div>
                </div>
            `;
            
            const flashcardContainer = document.getElementById('flashcard-container');
            const prevButton = document.getElementById('prev-card');
            const nextButton = document.getElementById('next-card');
            const speakButton = document.getElementById('speak-word');
            
            function renderCard() {
                const card = appState.vocabulary[appState.currentCardIndex];
                flashcardContainer.innerHTML = `
                    <div id="flashcard" class="flip-card w-full h-full cursor-pointer">
                        <div class="flip-card-inner">
                            <div class="flip-card-front bg-purple-50">
                                <img src="${card.image}" alt="${card.word}" class="w-32 h-32 md:w-48 md:h-48 rounded-full mb-4 object-cover border-4 border-white shadow">
                                <h3 class="text-2xl font-bold text-gray-800">${card.word}</h3>
                            </div>
                            <div class="flip-card-back bg-white text-center p-6 border-2 border-purple-200">
                                <h3 class="text-xl md:text-2xl font-bold text-purple-700 mb-2">${card.translation}</h3>
                                <p class="text-sm md:text-base text-gray-600 mt-2">${card.context}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                const currentCard = document.getElementById('flashcard');
                currentCard.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });
                updateButtons();
            }

            function updateButtons() {
                prevButton.disabled = appState.currentCardIndex === 0;
                nextButton.disabled = appState.currentCardIndex === appState.vocabulary.length - 1;
            }

            prevButton.addEventListener('click', () => {
                if (appState.currentCardIndex > 0) {
                    appState.currentCardIndex--;
                    renderCard();
                }
            });
            nextButton.addEventListener('click', () => {
                if (appState.currentCardIndex < appState.vocabulary.length - 1) {
                    appState.currentCardIndex++;
                    renderCard();
                }
            });
            
            speakButton.addEventListener('click', () => {
                const wordToSpeak = appState.vocabulary[appState.currentCardIndex].word;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(wordToSpeak);
                    utterance.lang = 'en-US';
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert('Your browser does not support the Web Speech API.');
                }
            });

            renderCard();
        }

                    </div>
                </div>

            const chatBox = document.getElementById('chat-box');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            
            function addMessage(text, isUser = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `flex ${isUser ? 'justify-end' : 'items-start'}`;
                
                const messageBubble = document.createElement('div');
                messageBubble.className = `p-3 rounded-xl max-w-[85%]`;

                if (isUser) {
                    messageBubble.classList.add('bg-blue-600', 'text-white');
                    messageBubble.textContent = text;
                    messageDiv.appendChild(messageBubble);
                } else {
                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'w-8 h-8 rounded-full bg-purple-500 text-white flex items-center justify-center mr-3 flex-shrink-0';
                    iconDiv.innerHTML = '<i class="fas fa-robot"></i>';
                    
                    messageBubble.classList.add('bg-purple-100', 'text-purple-800');
                    messageBubble.textContent = text;
                    
                    messageDiv.appendChild(iconDiv);
                    messageDiv.appendChild(messageBubble);
                }
                
                chatBox.appendChild(messageDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function simulateResponse(prompt) {
                const lowerPrompt = prompt.toLowerCase();
                let response = '';

                if (lowerPrompt.includes('email') || lowerPrompt.includes('write')) {
                    response = 'To write a professional email, always start with a clear subject line and a formal greeting like "Dear [Name]". State your purpose clearly in the first paragraph, and close with a professional sign-off.';
                } else if (lowerPrompt.includes('meeting') || lowerPrompt.includes('presentation')) {
                    response = 'For a successful meeting, use phrases like "Let\'s get started," and "I have a few points to cover." Maintain eye contact and speak clearly. To present data, use transitions like "As you can see from the chart..."';
                } else if (lowerPrompt.includes('vocabulary') || lowerPrompt.includes('word')) {
                    response = 'To expand your vocabulary, use new words in sentences right after you learn them. Try using words like "synergy," "proactive," or "leverage."';
                } else {
                    response = "That's a great question! For professional communication, focus on clarity, conciseness, and confidence. Keep practicing and you'll improve quickly!";
                }

                setTimeout(() => {
                    addMessage(response, false);
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                }, 1000);
            }

            sendBtn.addEventListener('click', () => {
                const prompt = userInput.value.trim();
                if (prompt) {
                    addMessage(prompt, true);
                    userInput.value = '';
                    sendBtn.disabled = true;
                    userInput.disabled = true;
                    simulateResponse(prompt);
                }
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });
        }

        // --- Navigation Logic ---
        function navigateTo(pageName) {

                mobileMenu.classList.add('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });

            switch (appState.currentPage) {
                case 'home':
                    renderHomePage();
                    break;
                case 'foundational':
                    appState.currentCardIndex = 0;
                    renderFoundationalPage();
                    break;
                case 'professional':
                    renderProfessionalPage();
                    break;
                case 'pricing':
                    renderPricingPage();
                    break;
                default:
                    renderHomePage();
            }
        }
